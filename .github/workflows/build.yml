name: 编译 Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: 设置 Gradle 8.7
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.7'

      - name: 诊断 Gradle 环境
        run: |
          echo "=== 检查 settings.gradle.kts ==="
          cat settings.gradle.kts
          echo "=== 检查 Gradle 版本 ==="
          gradle --version
          echo "=== 检查可用插件（仅解析） ==="
          gradle help --dry-run

      - name: 强制刷新依赖并编译
        run: gradle clean assembleDebug --refresh-dependencies --stacktrace

      - name: 上传 APK 到 Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
